<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Subtítulos en español</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 900px; margin: 0 auto; padding: 20px; background: #111; color: #fff; }
    input { width: 70%; padding: 10px; font-size: 16px; }
    button { padding: 10px 20px; font-size: 16px; background: #e00; color: #fff; border: none; cursor: pointer; }
    #player { margin-top: 20px; }
    #subtitulos { margin-top: 10px; background: #000; color: #fff; font-size: 22px; text-align: center; padding: 15px; min-height: 60px; border-radius: 8px; }
    #estado { margin-top: 10px; color: #aaa; font-size: 14px; }
    #estado2 { color: #fff; margin-top: 5px; font-size: 14px; }
    #progreso { margin-top: 5px; background: #333; border-radius: 4px; height: 8px; }
    #barra { height: 8px; background: #e00; border-radius: 4px; width: 0%; transition: width 0.5s; }
    #controles { margin-top: 10px; display: none; }
    #controles button { margin-right: 10px; background: #333; }
  </style>
</head>
<body>
  <h1>🎬 Subtítulos en español by Tenpayaky</h1>
  <input id="url" type="text" placeholder="Pega aquí la URL de YouTube..." />
  <button onclick="cargar()">Cargar</button>
  <div id="estado"></div>
  <div id="progreso"><div id="barra"></div></div>
  <div id="estado2"></div>
  <div id="controles">
    <button onclick="togglePlay()">▶/⏸ Play/Pausa (o Espacio)</button>
    <button onclick="retrasar()">⏪ -5s</button>
    <button onclick="adelantar()">⏩ +5s</button>
  </div>
  <div id="player"></div>
  <div id="subtitulos">Los subtítulos aparecerán aquí...</div>

  <script>
    let segments = [], intervalo;
    let reproduciendo = false, tiempoInicio = null, tiempoOffset = 0;

    function cargar() {
      const url = document.getElementById('url').value;
      const match = url.match(/(?:v=|youtu\.be\/)([^&\n?#]+)/);
      if (!match) return alert('URL no válida');
      const videoId = match[1];

      segments = [];
      reproduciendo = false;
      tiempoInicio = null;
      tiempoOffset = 0;

      document.getElementById('estado').textContent = '⏳ Procesando vídeo... puede tardar varios minutos.';
      document.getElementById('subtitulos').textContent = 'Los subtítulos aparecerán aquí...';
      document.getElementById('barra').style.width = '0%';
      document.getElementById('estado2').textContent = '';
      document.getElementById('controles').style.display = 'block';

      document.getElementById('player').innerHTML = `
        <iframe id="yt" width="100%" height="400"
          src="https://www.youtube.com/embed/${videoId}"
          frameborder="0" allowfullscreen></iframe>
      `;

      clearInterval(intervalo);
      intervalo = setInterval(actualizarSub, 300);

      cargarSubtitulos(videoId);
    }

    async function cargarSubtitulos(videoId) {
      try {
        const res = await fetch('https://subtitulos-youtube-production.up.railway.app/api/transcribe', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ videoId })
        });
        const data = await res.json();
        if (data.error) {
          document.getElementById('estado').textContent = '❌ Error: ' + data.error;
          return;
        }
        segments = data.segments || [];
        document.getElementById('barra').style.width = '100%';
        document.getElementById('estado').textContent = '✅ Subtítulos listos. Dale al play y pulsa ▶ para sincronizar.';
      } catch(e) {
        document.getElementById('estado').textContent = '❌ Error: ' + e.message;
      }
    }

    function togglePlay() {
      if (reproduciendo) {
        tiempoOffset = tiempoOffset + (Date.now() - tiempoInicio) / 1000;
        tiempoInicio = null;
        reproduciendo = false;
        document.getElementById('estado2').textContent = '⏸ Pausado en ' + Math.floor(tiempoOffset) + 's';
      } else {
        tiempoInicio = Date.now();
        reproduciendo = true;
        document.getElementById('estado2').textContent = '▶ Reproduciendo desde ' + Math.floor(tiempoOffset) + 's';
      }
    }

    function retrasar() {
      tiempoOffset = Math.max(0, tiempoOffset - 5);
      if (reproduciendo) tiempoInicio = Date.now();
      document.getElementById('estado2').textContent = '⏪ Ajustado a ' + Math.floor(tiempoOffset) + 's';
    }

    function adelantar() {
      tiempoOffset = tiempoOffset + 5;
      if (reproduciendo) tiempoInicio = Date.now();
      document.getElementById('estado2').textContent = '⏩ Ajustado a ' + Math.floor(tiempoOffset) + 's';
    }

    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space' && e.target === document.body) {
        e.preventDefault();
        togglePlay();
      }
    });

    function actualizarSub() {
      let t = tiempoOffset;
      if (reproduciendo && tiempoInicio !== null) {
        t = tiempoOffset + (Date.now() - tiempoInicio) / 1000;
      }
      const seg = segments.find(s => t >= s.start && t <= s.end);
      document.getElementById('subtitulos').textContent = seg ? seg.text : '';
    }
  </script>
</body>
</html>
