<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Subtítulos en español</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 900px; margin: 0 auto; padding: 20px; background: #111; color: #fff; }
    input { width: 70%; padding: 10px; font-size: 16px; }
    button { padding: 10px 20px; font-size: 16px; background: #e00; color: #fff; border: none; cursor: pointer; }
    #player { margin-top: 20px; }
    #subtitulos { margin-top: 10px; background: #000; color: #fff; font-size: 22px; text-align: center; padding: 15px; min-height: 60px; border-radius: 8px; }
    #estado { margin-top: 10px; color: #aaa; font-size: 14px; }
    #progreso { margin-top: 5px; background: #333; border-radius: 4px; height: 8px; }
    #barra { height: 8px; background: #e00; border-radius: 4px; width: 0%; transition: width 0.5s; }
  </style>
</head>
<body>
  <h1>🎬 Subtítulos en español by Tenpayaky</h1>
  <input id="url" type="text" placeholder="Pega aquí la URL de YouTube..." />
  <button onclick="cargar()">Cargar</button>
  <div id="estado"></div>
  <div id="progreso"><div id="barra"></div></div>
  <div id="player"></div>
  <div id="subtitulos">Los subtítulos aparecerán aquí...</div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    let player, segments = [], intervalo;
    let tiempoInicio = null, tiempoOffset = 0;
    const DURACION = 7200;

    function cargar() {
      const url = document.getElementById('url').value;
      const match = url.match(/(?:v=|youtu\.be\/)([^&\n?#]+)/);
      if (!match) return alert('URL no válida');
      const videoId = match[1];

      segments = [];
      tiempoInicio = null;
      tiempoOffset = 0;
      document.getElementById('estado').textContent = '⏳ Procesando primer bloque...';
      document.getElementById('subtitulos').textContent = 'Los subtítulos aparecerán aquí...';
      document.getElementById('barra').style.width = '0%';

      if (player) player.destroy();
      document.getElementById('player').innerHTML = '<div id="yt"></div>';
      player = new YT.Player('yt', {
        height: '400', width: '100%', videoId,
        events: {
          onReady: () => {},
          onStateChange: (e) => {
            if (e.data === 1) {
              // Reproduciendo
              try { tiempoOffset = player.getCurrentTime() || 0; } catch(err) { tiempoOffset = 0; }
              tiempoInicio = Date.now();
            } else if (e.data === 2) {
              // Pausado
              if (tiempoInicio !== null) {
                tiempoOffset = tiempoOffset + (Date.now() - tiempoInicio) / 1000;
                tiempoInicio = null;
              }
            }
          }
        }
      });

      clearInterval(intervalo);
      intervalo = setInterval(actualizarSub, 300);

      procesarTrozo(videoId, 0, DURACION);
    }

    async function procesarTrozo(videoId, startTime, duracionTotal) {
      try {
        const res = await fetch('https://subtitulos-youtube-production.up.railway.app/api/transcribe', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ videoId, startTime })
        });
        const data = await res.json();
        if (data.error) {
          document.getElementById('estado').textContent = '❌ Error en bloque ' + startTime + ': ' + data.error;
          // Intentar siguiente bloque igualmente
          if (startTime + 600 < duracionTotal) {
            procesarTrozo(videoId, startTime + 600, duracionTotal);
          }
          return;
        }

        segments = segments.concat(data.segments || []);
        const pct = Math.min(100, Math.round((data.nextStart / duracionTotal) * 100));
        document.getElementById('barra').style.width = pct + '%';
        document.getElementById('estado').textContent = `✅ Procesado hasta ${Math.floor(data.nextStart/60)} min. Cargando más...`;

        if (data.nextStart < duracionTotal) {
          procesarTrozo(videoId, data.nextStart, duracionTotal);
        } else {
          document.getElementById('estado').textContent = '✅ Todo listo.';
        }
      } catch(e) {
        document.getElementById('estado').textContent = '❌ Error: ' + e.message;
      }
    }

    function actualizarSub() {
      let t = 0;
      if (tiempoInicio !== null) {
        t = tiempoOffset + (Date.now() - tiempoInicio) / 1000;
      } else {
        t = tiempoOffset;
      }
      const seg = segments.find(s => t >= s.start && t <= s.end);
      document.getElementById('subtitulos').textContent = seg ? seg.text : '';
    }
  </script>
</body>
</html>
